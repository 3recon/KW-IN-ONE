<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KW IN ONE 설정</title>
    <style>
      body {
        margin: 0;
        padding: 32px;
        font-family: "Segoe UI", "Apple SD Gothic Neo", sans-serif;
        background: #f6f2ea;
        color: #1f1d18;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px;
        border-radius: 20px;
        background: #fffdf8;
        box-shadow: 0 12px 32px rgba(74, 58, 35, 0.12);
      }
      h1 {
        margin-top: 0;
      }
      .field {
        margin-top: 20px;
      }
      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 12px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }
      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        font-weight: 500;
      }
      input[type="number"] {
        width: 120px;
        padding: 10px 12px;
        border: 1px solid #d8cfbe;
        border-radius: 12px;
      }
      .category-box {
        padding: 16px;
        border: 1px solid #d8cfbe;
        border-radius: 16px;
        background: #fffaf2;
      }
      button {
        margin-top: 24px;
        padding: 12px 16px;
        border: 0;
        border-radius: 12px;
        background: #8f1d1d;
        color: #fff;
        cursor: pointer;
      }
      .status {
        margin-top: 14px;
        color: #6f6a5d;
      }
      .hint {
        margin-top: 8px;
        color: #6f6a5d;
        font-size: 13px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>KW IN ONE 설정</h1>
      <p>알림 주기와 공지 카테고리 표시 범위를 설정합니다.</p>

      <div class="field">
        <label class="checkbox-label">
          <input id="notificationsEnabled" type="checkbox">
          브라우저 알림 사용
        </label>
      </div>

      <div class="field">
        <label for="refreshMinutes">공지 확인 주기(분)</label>
        <input id="refreshMinutes" type="number" min="15" step="5">
      </div>

      <div class="field">
        <label>공지 카테고리 선택</label>
        <div id="categoryList" class="category-box field-grid"></div>
        <p class="hint">
          `전체`를 선택하면 모든 공지를 보여주고, 해제하면 선택한 카테고리만 표시합니다.
        </p>
      </div>

      <button id="saveButton" type="button">설정 저장</button>
      <div id="status" class="status"></div>
    </main>

    <script src="../data/notice-categories.js"></script>
    <script src="options.js"></script>
  </body>
</html>
