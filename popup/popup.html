<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KW IN ONE</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <h1>KW IN ONE</h1>
      </header>

      <section class="panel">
        <div class="section-header">
          <h2>바로가기</h2>
        </div>
        <div class="link-grid" id="quickLinks"></div>
      </section>

      <section class="panel countdown-panel">
        <div class="section-header">
          <h2>나의 일정</h2>
          <button id="toggleCountdownSettings" class="ghost-button" type="button">일정 설정</button>
        </div>
        <div id="countdownList" class="countdown-list"></div>
        <section class="inline-settings is-collapsed" id="countdownSettings">
          <div class="settings-group">
            <label class="select-label" for="countdownLabelInput">일정명</label>
            <input id="countdownLabelInput" class="number-input" type="text" placeholder="예: 자료구조 중간고사">
          </div>
          <div class="settings-group">
            <label class="select-label" for="openCalendarModal">날짜와 시간</label>
            <input id="countdownDateTimeInput" type="hidden">
            <button id="openCalendarModal" class="ghost-button full-width" type="button">날짜와 시간을 선택하세요</button>
          </div>
          <button id="saveCountdown" class="primary-button full-width" type="button">일정 저장</button>
          <div id="countdownStatus" class="settings-status"></div>
        </section>
      </section>

      <section class="panel">
        <div class="section-header">
          <h2>통합 공지</h2>
          <div class="header-actions">
            <button id="toggleSettings" class="ghost-button" type="button">카테고리 설정</button>
          </div>
        </div>
        <section class="inline-settings is-collapsed" id="settingsPanel">
          <div class="settings-group">
            <div class="settings-title">공지 카테고리</div>
            <div id="categoryList" class="category-grid"></div>
            <p class="settings-hint">`전체`를 선택하면 모든 공지를 표시합니다.</p>
          </div>

          <button id="saveSettings" class="primary-button full-width" type="button">설정 저장</button>
          <div id="settingsStatus" class="settings-status"></div>
        </section>
        <ul class="notice-list" id="noticeList"></ul>
      </section>

      <section class="panel meal-panel">
        <div class="section-header">
          <h2>오늘의 학식</h2>
          <span class="pill" id="mealLabel"></span>
        </div>
        <div id="mealSummary" class="meal-summary"></div>
        <button id="openDiningPage" class="ghost-button full-width" type="button">학식 페이지 열기</button>
      </section>

      <section class="calendar-modal is-collapsed" id="calendarModal">
        <div class="calendar-backdrop" id="calendarBackdrop"></div>
        <div class="calendar-dialog">
          <div class="calendar-header">
            <button id="prevMonth" class="ghost-button" type="button">이전</button>
            <div id="calendarTitle" class="calendar-title"></div>
            <button id="nextMonth" class="ghost-button" type="button">다음</button>
          </div>
          <div class="calendar-weekdays">
            <span>일</span>
            <span>월</span>
            <span>화</span>
            <span>수</span>
            <span>목</span>
            <span>금</span>
            <span>토</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
          <div class="calendar-time-row">
            <label class="select-label" for="calendarHour">시간</label>
            <div class="calendar-time-selects">
              <select id="calendarHour" class="select"></select>
              <span>:</span>
              <select id="calendarMinute" class="select"></select>
            </div>
          </div>
          <button id="confirmCalendar" class="primary-button full-width" type="button">확인</button>
        </div>
      </section>
    </main>

    <script src="../data/notice-categories.js"></script>
    <script type="module" src="popup.js"></script>
  </body>
</html>
