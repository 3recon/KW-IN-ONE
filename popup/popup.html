<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KW IN ONE</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <h1>KW IN ONE</h1>
      </header>

      <section class="panel">
        <div class="section-header">
          <h2>바로가기</h2>
          <span class="muted">자주 쓰는 서비스</span>
        </div>
        <div class="link-grid" id="quickLinks"></div>
      </section>

      <section class="panel">
        <div class="section-header">
          <h2>통합 공지</h2>
          <div class="header-actions">
            <button id="toggleSettings" class="ghost-button" type="button">설정</button>
            <button id="refreshNotices" class="ghost-button" type="button">새로고침</button>
          </div>
        </div>
        <section class="inline-settings is-collapsed" id="settingsPanel">
          <div class="settings-group">
            <label class="inline-check">
              <input id="notificationsEnabled" type="checkbox">
              <span>브라우저 알림 사용</span>
            </label>
          </div>

          <div class="settings-group">
            <label class="select-label" for="refreshMinutes">공지 확인 주기(분)</label>
            <input id="refreshMinutes" class="number-input" type="number" min="15" step="5">
          </div>

          <div class="settings-group">
            <div class="settings-title">공지 카테고리</div>
            <div id="categoryList" class="category-grid"></div>
            <p class="settings-hint">`전체`를 선택하면 모든 공지를 표시합니다.</p>
          </div>

          <button id="saveSettings" class="primary-button full-width" type="button">설정 저장</button>
          <div id="settingsStatus" class="settings-status"></div>
        </section>
        <ul class="notice-list" id="noticeList"></ul>
      </section>

      <section class="panel meal-panel">
        <div class="section-header">
          <h2>오늘의 학식</h2>
          <span class="pill" id="mealLabel"></span>
        </div>
        <div id="mealSummary" class="meal-summary"></div>
        <button id="openDiningPage" class="ghost-button full-width" type="button">학식 페이지 열기</button>
      </section>

      <section class="panel">
        <div class="section-header">
          <h2>전화번호부</h2>
          <span class="muted">자주 찾는 부서</span>
        </div>
        <label class="select-label" for="phonebookCategory">카테고리 선택</label>
        <select id="phonebookCategory" class="select"></select>
        <ul class="phone-list" id="phoneList"></ul>
      </section>
    </main>

    <script src="../data/phonebook.js"></script>
    <script src="../data/notice-categories.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
